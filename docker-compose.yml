version: "3.9"

services:
  api:
    image: ghcr.io/saleor/saleor:3.22.0
    container_name: saleor-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - saleor-media:/app/media
    env_file:
      - common.env
      - backend.env
    environment:
      - DATABASE_URL=postgres://saleor:saleor@db:5432/saleor
      - REDIS_URL=redis://cache:6379/0
      - DASHBOARD_URL=http://localhost:9000/
      - ALLOWED_HOSTS=localhost,127.0.0.1,api
    stdin_open: true
    tty: true

  dashboard:
    image: ghcr.io/saleor/saleor-dashboard:3.21.0
    container_name: saleor-dashboard
    ports:
      - "9000:80"
    restart: unless-stopped

  db:
    image: postgres:15.6-alpine
    container_name: saleor-db
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=saleor
      - POSTGRES_USER=saleor
      - POSTGRES_PASSWORD=saleor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saleor"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: valkey/valkey:9.1-alpine3.23
    container_name: saleor-cache
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-cache:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    image: ghcr.io/saleor/saleor:3.22.0
    container_name: saleor-worker
    command: celery -A saleor.celeryconf:app worker --loglevel=info
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    env_file:
      - common.env
      - backend.env
    environment:
      - DATABASE_URL=postgres://saleor:saleor@db:5432/saleor
      - REDIS_URL=redis://cache:6379/0
    volumes:
      - saleor-media:/app/media

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    ports:
      - "16686:16686"

  mailpit:
    image: axllent/mailpit:v1.29
    container_name: mailpit
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  saleor-db:
  saleor-cache:
  saleor-media:

networks:
  saleor-backend-tier:
    driver: bridge